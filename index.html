<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>G2B 마케팅 공고 큐레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background-color: #f4f7f9; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a202c; border-bottom: 2px solid #edf2f7; padding-bottom: 15px; }
        .info { background: #ebf8ff; padding: 15px; border-radius: 8px; color: #2b6cb0; margin-bottom: 20px; }
        button { padding: 12px 25px; cursor: pointer; background: #3182ce; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #2b6cb0; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; }
        th, td { border: 1px solid #e2e8f0; padding: 15px; text-align: left; }
        th { background-color: #f7fafc; color: #4a5568; font-weight: 600; }
        tr:hover { background-color: #fffaf0; }
        .error { color: #e53e3e; font-weight: bold; margin-top: 15px; }
        .badge { background: #edf2f7; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; }
        a { color: #3182ce; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏛️ 나라장터 공고 정밀 분석기</h1>
        <div class="info">
            <strong>🎯 타겟 키워드:</strong> 
            <span class="badge">뉴미디어</span><span class="badge">온라인 홍보</span><span class="badge">SNS</span>
            <span class="badge">유튜브</span><span class="badge">영상</span><span class="badge">관광</span>
            <span class="badge">브랜딩</span><span class="badge">마케팅</span><span class="badge">서포터즈</span>
        </div>
        
        <p>최근 15일간의 데이터를 중계 서버를 통해 안전하게 분석합니다.</p>
        <button onclick="fetchData()">🚀 맞춤 공고 분석 시작</button>
        
        <div id="status"></div>
        
        <table id="resultTable" style="display:none;">
            <thead>
                <tr>
                    <th>공고명</th>
                    <th>공고기관</th>
                    <th>마감일시</th>
                    <th>상세보기</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <script>
        const TARGET_KEYWORDS = ["뉴미디어", "온라인 홍보", "SNS", "유튜브", "영상", "홍보 영상", "관광", "브랜딩", "마케팅", "서포터즈", "통합 홍보"];

        async function fetchData() {
            const status = document.getElementById('status');
            const tbody = document.getElementById('resultBody');
            const table = document.getElementById('resultTable');

            // [수정] 1단계에서 복사한 구글 웹 앱 URL을 여기에 붙여넣으세요.
            const googleProxyUrl = "https://script.google.com/macros/s/AKfycbwu9eoLXTkE-p5rmLZIUpIJjJ9-DnHl3R_yly-M2Eb9JOVX3W2b89H3yGd1q4BkCo_YtQ/exec";

            if(googleProxyUrl.includes("여기에_구글")) {
                alert("구글 중계 서버 URL을 먼저 설정해 주세요.");
                return;
            }

            status.innerHTML = "<p>⏳ 중계 서버를 통해 나라장터 데이터를 가져오고 있습니다...</p>";
            table.style.display = 'none';

            try {
                // 구글 서버로 요청 (CORS 문제 없음)
                const res = await axios.get(googleProxyUrl);
                const data = res.data.response;

                if (data.header.resultCode !== '00' && data.header.resultCode !== '03') {
                    status.innerHTML = `<p class="error">❌ API 에러: ${data.header.resultMsg}</p>`;
                    return;
                }

                const items = data.body.items || [];
                // 키워드 필터링
                const filtered = items.filter(item => 
                    TARGET_KEYWORDS.some(kw => item.bidNtceNm.includes(kw))
                );

                if (filtered.length === 0) {
                    status.innerHTML = "<p>⚠️ 검색 조건에 맞는 공고가 현재 없습니다.</p>";
                    return;
                }

                // 테이블 렌더링
                tbody.innerHTML = filtered.map(item => `
                    <tr>
                        <td><strong>${item.bidNtceNm}</strong></td>
                        <td>${item.ntceInsttNm}</td>
                        <td>${item.bidClseDt || '-'}</td>
                        <td><a href="${item.bidNtceUrl}" target="_blank">🔗 공고이동</a></td>
                    </tr>
                `).join('');

                table.style.display = 'table';
                status.innerHTML = `<p style="color:green; font-weight:bold;">✅ 분석 완료: 총 ${filtered.length}건 발견</p>`;

            } catch (e) {
                status.innerHTML = `<p class="error">❌ 서버 연결 실패: 구글 앱스 스크립트 배포 설정을 확인하세요.</p>`;
                console.error(e);
            }
        }
    </script>
</body>
</html>
